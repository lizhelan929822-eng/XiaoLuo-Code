<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoLuo Code - 对话</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      color: #ffffff;
    }
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      background: #2d2d2d;
      padding: 16px;
      border-bottom: 1px solid #3d3d3d;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo span {
      font-size: 24px;
    }
    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      color: #667eea;
    }
    .status {
      font-size: 12px;
      color: #888;
    }
    .chat-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 250px;
      background: #252525;
      border-right: 1px solid #3d3d3d;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #3d3d3d;
      font-weight: 600;
      font-size: 14px;
    }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .session-item {
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      font-size: 14px;
      transition: background 0.2s;
    }
    .session-item:hover {
      background: #353535;
    }
    .session-item.active {
      background: #667eea;
      color: white;
    }
    .main-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
    }
    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message.assistant {
      align-self: flex-start;
    }
    .message.system {
      align-self: center;
      max-width: 60%;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .avatar.user {
      background: #667eea;
      color: white;
    }
    .avatar.assistant {
      background: #48bb78;
      color: white;
    }
    .avatar.system {
      background: #ed8936;
      color: white;
    }
    .message-content {
      flex: 1;
    }
    .message-header {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }
    .message-body {
      background: #2d2d2d;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
    }
    .message.user .message-body {
      background: #667eea;
      color: white;
    }
    .message.system .message-body {
      background: #333;
      color: #ed8936;
      font-style: italic;
    }
    .message-body code {
      background: #3d3d3d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, Inconsolata, 'Roboto Mono', Consolas, 'Courier New', monospace;
      font-size: 13px;
    }
    .message-body pre {
      background: #3d3d3d;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .message-body pre code {
      background: none;
      padding: 0;
    }
    .input-area {
      border-top: 1px solid #3d3d3d;
      padding: 16px;
      background: #2d2d2d;
    }
    .input-container {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      position: relative;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      max-height: 200px;
      background: #3d3d3d;
      border: 1px solid #4d4d4d;
      border-radius: 8px;
      padding: 12px 40px 12px 16px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: #667eea;
    }
    .input-actions {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a6bda;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: #4d4d4d;
      color: white;
    }
    .btn-secondary:hover {
      background: #5d5d5d;
    }
    .file-upload {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      background: #3d3d3d;
      border-radius: 8px;
      font-size: 13px;
    }
    .file-upload .file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-upload .file-size {
      font-size: 12px;
      color: #888;
    }
    .file-upload .remove-file {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
    }
    .file-upload .remove-file:hover {
      color: #f56565;
    }
    .slash-commands {
      position: absolute;
      top: -30px;
      left: 0;
      right: 0;
      background: #3d3d3d;
      border: 1px solid #4d4d4d;
      border-radius: 8px 8px 0 0;
      padding: 4px 8px;
      font-size: 12px;
      color: #888;
      display: flex;
      gap: 12px;
      overflow-x: auto;
    }
    .slash-command {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .slash-command:hover {
      background: #4d4d4d;
      color: white;
    }
    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 14px;
    }
    .loading-dots {
      display: flex;
      gap: 4px;
    }
    .loading-dot {
      width: 6px;
      height: 6px;
      background: #888;
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out both;
    }
    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
      .message {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span>🤖</span>
        <h1>XiaoLuo Code</h1>
      </div>
      <div class="status" id="status">已连接</div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">会话</div>
        <div class="sidebar-content">
          <div class="session-item active">新会话</div>
          <div class="session-item">会话 1</div>
          <div class="session-item">会话 2</div>
          <div class="session-item">会话 3</div>
        </div>
      </div>

      <!-- Main Chat -->
      <div class="main-chat">
        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
          <div class="message system">
            <div class="avatar system">⚙️</div>
            <div class="message-content">
              <div class="message-body">
                欢迎使用 XiaoLuo Code！我是你的AI编程助手。
                <br><br>
                你可以：
                <br>- 询问编程问题
                <br>- 要求编写/修改代码
                <br>- 拖放文件分析
                <br>- 使用 / 命令（如 /help、/clear 等）
              </div>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="slash-commands" id="slashCommands">
            <span class="slash-command" onclick="insertSlashCommand('/help')">/help</span>
            <span class="slash-command" onclick="insertSlashCommand('/clear')">/clear</span>
            <span class="slash-command" onclick="insertSlashCommand('/commit')">/commit</span>
            <span class="slash-command" onclick="insertSlashCommand('/review')">/review</span>
            <span class="slash-command" onclick="insertSlashCommand('/session')">/session</span>
          </div>
          <div class="input-container">
            <div class="input-box">
              <textarea id="messageInput" placeholder="输入消息... 按 Shift+Enter 换行，按 Enter 发送" onkeydown="handleKeyDown(event)"></textarea>
            </div>
            <div class="input-actions">
              <button class="btn btn-secondary" onclick="clearInput()">清除</button>
              <button class="btn btn-primary" onclick="sendMessage()">发送</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let messages = [];
    let isLoading = false;

    // Initialize
    async function init() {
      try {
        const configRes = await fetch('/api/config');
        const config = await configRes.json();
        if (!config.provider || !config.model) {
          showSystemMessage('请先配置 API Key：<a href="/" style="color: #667eea;">前往配置</a>');
        } else {
          document.getElementById('status').textContent = `已连接: ${config.provider} - ${config.model}`;
        }
      } catch (error) {
        showSystemMessage('加载配置失败');
      }
    }

    // Handle key down
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Insert slash command
    function insertSlashCommand(command) {
      const input = document.getElementById('messageInput');
      input.value = command + ' ';
      input.focus();
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();
      
      if (!content || isLoading) return;

      // Add user message
      addMessage('user', content);
      input.value = '';
      isLoading = true;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: content })
        });

        if (!response.ok) {
          throw new Error('API 错误');
        }

        const data = await response.json();
        addMessage('assistant', data.response);
      } catch (error) {
        addMessage('assistant', `抱歉，发生错误：${error.message}`);
      } finally {
        isLoading = false;
      }
    }

    // Add message to chat
    function addMessage(role, content) {
      const messagesContainer = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      let avatar = '👤';
      if (role === 'assistant') avatar = '🤖';
      if (role === 'system') avatar = '⚙️';

      messageDiv.innerHTML = `
        <div class="avatar ${role}">${avatar}</div>
        <div class="message-content">
          <div class="message-body">${formatMessage(content)}</div>
        </div>
      `;

      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Show system message
    function showSystemMessage(content) {
      const messagesContainer = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message system';
      messageDiv.innerHTML = `
        <div class="avatar system">⚙️</div>
        <div class="message-content">
          <div class="message-body">${content}</div>
        </div>
      `;
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Format message (basic markdown support)
    function formatMessage(content) {
      return content
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    // Clear input
    function clearInput() {
      document.getElementById('messageInput').value = '';
    }

    // Initialize
    init();
  </script>
</body>
</html>
