<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XiaoLuo Code - 配置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo span {
      font-size: 48px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }
    select, input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e1e1;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-success {
      background: #48bb78;
      color: white;
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(72, 187, 120, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }
    .status.success {
      background: #c6f6d5;
      color: #22543d;
      display: block;
    }
    .status.error {
      background: #fed7d7;
      color: #742a2a;
      display: block;
    }
    .status.loading {
      background: #bee3f8;
      color: #2c5282;
      display: block;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
    .current-config {
      background: #f7fafc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .current-config h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
    }
    .config-item {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      font-size: 14px;
    }
    .config-item span:first-child {
      color: #888;
    }
    .config-item span:last-child {
      color: #333;
      font-weight: 500;
    }
    .advanced {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e1e1e1;
    }
    .advanced-toggle {
      color: #667eea;
      cursor: pointer;
      font-size: 14px;
    }
    .advanced-fields {
      display: none;
      margin-top: 15px;
    }
    .advanced-fields.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>🤖</span>
    </div>
    <h1>XiaoLuo Code 配置向导</h1>

    <div id="currentConfig" class="current-config">
      <h3>当前配置</h3>
      <div class="config-item">
        <span>服务商</span>
        <span id="currentProvider">-</span>
      </div>
      <div class="config-item">
        <span>模型</span>
        <span id="currentModel">-</span>
      </div>
      <div class="config-item">
        <span>API Key</span>
        <span id="currentApiKey">-</span>
      </div>
    </div>

    <form id="configForm">
      <div class="form-group">
        <label for="provider">AI 服务商</label>
        <select id="provider" name="provider" required>
          <option value="">请选择服务商</option>
        </select>
      </div>

      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="password" id="apiKey" name="apiKey" placeholder="请输入 API Key" required>
        <p class="hint" id="apiKeyHint"></p>
      </div>

      <div class="form-group" id="baseUrlGroup" style="display: none;">
        <label for="baseUrl">API 地址 (可选)</label>
        <input type="text" id="baseUrl" name="baseUrl" placeholder="如需代理请填写">
        <p class="hint" id="baseUrlHint"></p>
      </div>

      <div class="form-group">
        <label for="model">模型 (推荐)</label>
        <select id="model" name="model">
          <option value="">请先选择服务商</option>
        </select>
      </div>

      <div class="form-group">
        <label for="customModelName">自定义模型名称</label>
        <input type="text" id="customModelName" name="customModelName" placeholder="直接输入要使用的模型名称，如: MiniMax-Text-01">
        <p class="hint">可覆盖上方选择，直接指定要连接的模型名称</p>
      </div>

      <div class="advanced">
        <span class="advanced-toggle" onclick="toggleAdvanced()">⚙️ 高级设置 ▼</span>
        <div class="advanced-fields" id="advancedFields">
          <div class="form-group">
            <label for="temperature">Temperature (创造性)</label>
            <input type="number" id="temperature" name="temperature" min="0" max="2" step="0.1" value="0.7">
          </div>
          <div class="form-group">
            <label for="maxTokens">最大 Token 数</label>
            <input type="number" id="maxTokens" name="maxTokens" min="100" max="100000" value="4096">
          </div>
        </div>
      </div>

      <button type="button" class="btn btn-success" id="testBtn" onclick="testConnection()">
        🔮 测试连接
      </button>
      <button type="submit" class="btn btn-primary">
        💾 保存配置
      </button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    let providers = [];
    let selectedProvider = null;

    // Load current config and providers
    async function init() {
      try {
        const [configRes, providersRes] = await Promise.all([
          fetch('/api/config'),
          fetch('/api/providers')
        ]);

        const config = await configRes.json();
        providers = await providersRes.json();

        // Update current config display
        document.getElementById('currentProvider').textContent = config.provider || '-';
        document.getElementById('currentModel').textContent = config.model || '-';
        document.getElementById('currentApiKey').textContent = config.apiKey ?
          config.apiKey.substring(0, 4) + '...' + config.apiKey.substring(config.apiKey.length - 4) : '-';

        // Populate provider dropdown
        const providerSelect = document.getElementById('provider');
        providers.forEach(p => {
          const option = document.createElement('option');
          option.value = p.id;
          option.textContent = p.name;
          if (p.id === config.provider) {
            option.selected = true;
            selectedProvider = p;
            loadModels(p.id, config.model);
          }
          providerSelect.appendChild(option);
        });

        if (config.temperature) document.getElementById('temperature').value = config.temperature;
        if (config.maxTokens) document.getElementById('maxTokens').value = config.maxTokens;
        if (config.customModelName) document.getElementById('customModelName').value = config.customModelName;
      } catch (error) {
        showStatus('加载配置失败: ' + error, 'error');
      }
    }

    // Provider selection handler
    document.getElementById('provider').addEventListener('change', async (e) => {
      const providerId = e.target.value;
      selectedProvider = providers.find(p => p.id === providerId);

      if (!selectedProvider) return;

      // Show/hide baseUrl field
      document.getElementById('baseUrlGroup').style.display =
        selectedProvider.requiresBaseUrl ? 'block' : 'none';

      // Update hints
      document.getElementById('apiKeyHint').textContent =
        getApiKeyHint(providerId);
      document.getElementById('baseUrlHint').textContent =
        getBaseUrlHint(providerId);

      // Load models
      await loadModels(providerId);
    });

    async function loadModels(providerId, selectedModel) {
      const modelSelect = document.getElementById('model');
      modelSelect.innerHTML = '<option value="">加载中...</option>';

      try {
        const res = await fetch(`/api/models/${providerId}`);
        const models = await res.json();

        modelSelect.innerHTML = '';
        models.forEach(m => {
          const option = document.createElement('option');
          option.value = m;
          option.textContent = m;
          if (m === selectedModel) option.selected = true;
          modelSelect.appendChild(option);
        });
      } catch (error) {
        modelSelect.innerHTML = '<option value="">加载失败</option>';
      }
    }

    function getApiKeyHint(providerId) {
      const hints = {
        openai: '从 platform.openai.com 获取 API Key',
        anthropic: '从 console.anthropic.com 获取 API Key',
        minimax: '从 MiniMax 开放平台获取 API Key (中国版/国际版)',
        google: '从 Google AI Studio 获取 API Key',
        aliyun: '从阿里云 DashScope 控制台获取 API Key',
        siliconflow: '从 siliconflow.cn 获取 API Key'
      };
      return hints[providerId] || '';
    }

    function getBaseUrlHint(providerId) {
      const hints = {
        minimax: '中国版: https://api.minimax.chat/v1 | 国际版: https://api.minimax.io/v1',
        aliyun: '默认: https://dashscope.aliyuncs.com/compatible-mode/v1',
        siliconflow: '默认: https://api.siliconflow.cn/v1'
      };
      return hints[providerId] || '使用官方默认地址';
    }

    function toggleAdvanced() {
      document.getElementById('advancedFields').classList.toggle('show');
    }

    async function testConnection() {
      const provider = document.getElementById('provider').value;
      const apiKey = document.getElementById('apiKey').value;
      const baseUrl = document.getElementById('baseUrl').value;

      if (!provider || !apiKey) {
        showStatus('请先选择服务商并输入 API Key', 'error');
        return;
      }

      const testBtn = document.getElementById('testBtn');
      testBtn.disabled = true;
      testBtn.textContent = '⏳ 测试中...';

      try {
        const res = await fetch('/api/test', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider, apiKey, baseUrl })
        });
        const result = await res.json();
        showStatus(result.message || (result.success ? '连接成功!' : '连接失败'), result.success ? 'success' : 'error');
      } catch (error) {
        showStatus('测试失败: ' + error, 'error');
      } finally {
        testBtn.disabled = false;
        testBtn.textContent = '🔮 测试连接';
      }
    }

    // Form submit handler
    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      // 自定义模型名称优先于下拉选择
      const customModel = document.getElementById('customModelName').value.trim();
      const selectedModel = document.getElementById('model').value;
      const finalModel = customModel || selectedModel;

      if (!finalModel) {
        showStatus('请选择或输入模型名称', 'error');
        return;
      }

      const data = {
        provider: document.getElementById('provider').value,
        apiKey: document.getElementById('apiKey').value,
        baseUrl: document.getElementById('baseUrl').value || undefined,
        model: finalModel,
        temperature: parseFloat(document.getElementById('temperature').value),
        maxTokens: parseInt(document.getElementById('maxTokens').value)
      };

      try {
        showStatus('正在保存...', 'loading');
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        if (res.ok) {
          showStatus('✅ 配置保存成功! 可以关闭此页面了。', 'success');
        } else {
          showStatus(result.error || '保存失败', 'error');
        }
      } catch (error) {
        showStatus('保存失败: ' + error, 'error');
      }
    });

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }

    // Initialize
    init();
  </script>
</body>
</html>
